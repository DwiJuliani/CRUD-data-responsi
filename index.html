<!DOCTYPE html>
<html>
<head>
<title>CRUD Data Mahasiswa</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-pink-200">

<div class="bg-white p-8 rounded-lg shadow-lg w-96">

<h1 class="text-2xl font-bold mb-4 text-center text-pink-600">
CRUD Data Mahasiswa
</h1>

<input id="nama" class="border p-2 w-full mb-3 rounded" placeholder="Masukkan Nama">

<button onclick="tambahData()" 
class="bg-pink-500 text-white px-4 py-2 rounded w-full hover:bg-pink-600">
Tambah
</button>

<ul id="list" class="mt-5 space-y-2"></ul>

</div>

<script>

let editIndex = -1

async function loadData(){
    let res = await fetch("/data")
    let data = await res.json()

    let list = document.getElementById("list")
    list.innerHTML=""

    data.forEach((d,i)=>{
        list.innerHTML += `
        <li class="flex justify-between items-center bg-pink-100 p-2 rounded">
            ${d.nama}
            <div>
            <button onclick="edit(${i},'${d.nama}')" 
            class="bg-yellow-400 text-white px-2 py-1 rounded mr-1">
            Edit
            </button>

            <button onclick="hapus(${i})" 
            class="bg-red-500 text-white px-2 py-1 rounded">
            Hapus
            </button>
            </div>
        </li>`
    })
}

async function tambahData(){

    let nama = document.getElementById("nama").value

    if(editIndex == -1){

        await fetch("/data",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({nama})
        })

    }else{

        await fetch("/data/"+editIndex,{
            method:"PUT",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({nama})
        })

        editIndex = -1
    }

    document.getElementById("nama").value=""
    loadData()
}

function edit(i,nama){
    document.getElementById("nama").value = nama
    editIndex = i
}

async function hapus(i){
    await fetch("/data/"+i,{method:"DELETE"})
    loadData()
}

loadData()

</script>

</body>
</html>
